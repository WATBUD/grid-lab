<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06080d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#grad2)"/>
  <rect x="40" y="40" width="432" height="432" rx="80" fill="none" stroke="url(#grad1)" stroke-width="8" opacity="0.3"/>
  <g transform="translate(106, 106)">
    <!-- Chart background -->
    <rect x="0" y="0" width="300" height="300" rx="20" fill="#1e293b" opacity="0.5"/>
    <!-- Grid lines -->
    <line x1="0" y1="75" x2="300" y2="75" stroke="#334155" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="150" x2="300" y2="150" stroke="#334155" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="225" x2="300" y2="225" stroke="#334155" stroke-width="2" opacity="0.3"/>
    <line x1="75" y1="0" x2="75" y2="300" stroke="#334155" stroke-width="2" opacity="0.3"/>
    <line x1="150" y1="0" x2="150" y2="300" stroke="#334155" stroke-width="2" opacity="0.3"/>
    <line x1="225" y1="0" x2="225" y2="300" stroke="#334155" stroke-width="2" opacity="0.3"/>
    <!-- Candlestick chart -->
    <g fill="url(#grad1)">
      <!-- Candle 1 -->
      <rect x="30" y="180" width="20" height="60" rx="2"/>
      <line x1="40" y1="160" x2="40" y2="250" stroke="url(#grad1)" stroke-width="3"/>
      <!-- Candle 2 -->
      <rect x="70" y="140" width="20" height="80" rx="2"/>
      <line x1="80" y1="120" x2="80" y2="230" stroke="url(#grad1)" stroke-width="3"/>
      <!-- Candle 3 -->
      <rect x="110" y="100" width="20" height="100" rx="2"/>
      <line x1="120" y1="80" x2="120" y2="210" stroke="url(#grad1)" stroke-width="3"/>
      <!-- Candle 4 -->
      <rect x="150" y="130" width="20" height="70" rx="2"/>
      <line x1="160" y1="110" x2="160" y2="210" stroke="url(#grad1)" stroke-width="3"/>
      <!-- Candle 5 -->
      <rect x="190" y="90" width="20" height="90" rx="2"/>
      <line x1="200" y1="70" x2="200" y2="190" stroke="url(#grad1)" stroke-width="3"/>
      <!-- Candle 6 -->
      <rect x="230" y="60" width="20" height="100" rx="2"/>
      <line x1="240" y1="40" x2="240" y2="170" stroke="url(#grad1)" stroke-width="3"/>
    </g>
    <!-- Trend line -->
    <path d="M 40 200 Q 120 150 200 100 T 280 50" stroke="#22d3ee" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- QL Logo -->
    <circle cx="250" cy="250" r="35" fill="url(#grad1)"/>
    <text x="250" y="260" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#06080d" text-anchor="middle">QL</text>
  </g>
</svg>
